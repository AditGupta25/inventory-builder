services:
  - type: web
    name: inventory-builder
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
